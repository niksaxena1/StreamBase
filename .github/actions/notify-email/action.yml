name: Send Email Notification
description: Sends an email notification via Gmail SMTP for SBase CI alerts

inputs:
  password:
    description: Gmail App Password (NOTIFY_SMTP_PASSWORD secret)
    required: true
  subject:
    description: Email subject line
    required: true
  body:
    description: Plain text email body
    required: true
  html_body:
    description: Optional HTML email body
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: nikhil.auh@gmail.com
        password: ${{ inputs.password }}
        subject: ${{ inputs.subject }}
        body: ${{ inputs.body }}
        html_body: ${{ inputs.html_body }}
        to: nikhil.auh@gmail.com
        from: SBase CI <nikhil.auh@gmail.com>
