name: SOT Daily Dashboard Sync

on:
  schedule:
    # Run 1 hour before the export workflow (export is 12:00 UTC)
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no clicking)"
        required: false
        type: boolean
        default: false
      limit:
        description: "Run only first N tasks (for testing)"
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Write storage state from secret
        env:
          SOT_STORAGE_STATE_B64: ${{ secrets.SOT_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$SOT_STORAGE_STATE_B64" ]; then
            echo "SOT_STORAGE_STATE_B64 not set (ok). Will rely on login fallback if configured."
            exit 0
          fi
          echo "$SOT_STORAGE_STATE_B64" | base64 --decode > sot_state.json

      - name: Sync dashboards to playlists
        env:
          SOT_EMAIL: ${{ secrets.SOT_EMAIL }}
          SOT_PASSWORD: ${{ secrets.SOT_PASSWORD }}
        run: |
          DRY="--fail-on-errors --headless"
          if [ "${{ inputs.dry_run }}" = "true" ]; then DRY="$DRY --dry-run"; fi
          if [ -n "${{ inputs.limit }}" ]; then DRY="$DRY --limit ${{ inputs.limit }}"; fi
          python scripts/sot_sync_dashboards.py --config config/playlists.csv --storage-state sot_state.json $DRY

      - name: Upload sync log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sot-dashboard-sync-${{ github.run_id }}
          path: .artifacts/dashboard_sync_log.csv
          if-no-files-found: warn

