name: Spotify Playlist Watch Daily

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max active watchlist playlists to check"
        required: false
        default: "3000"
      dry_run:
        description: "Fetch without writing to Supabase"
        required: false
        default: "false"
  schedule:
    # 08:30 UTC daily
    - cron: "30 8 * * *"

concurrency:
  group: spotify-playlist-watch-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      LIMIT: ${{ inputs.limit || '3000' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect playlist followers
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            python scripts/collect_playlist_watch_followers.py --limit "${LIMIT}" --dry-run
          else
            python scripts/collect_playlist_watch_followers.py --limit "${LIMIT}"
          fi

      - name: Send failure notification
        if: failure()
        uses: ./.github/actions/notify-email
        with:
          password: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
          subject: "[StreamBase] Spotify Playlist Watch FAILED"
          body: |
            The Spotify Playlist Watch workflow failed.

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
