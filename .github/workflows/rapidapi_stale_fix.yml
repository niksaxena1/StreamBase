name: RapidAPI Stale Track Fix

permissions:
  contents: read

on:
  schedule:
    - cron: "15 11 * * *" # 11:15 UTC daily (~1h15m after ingestion)
  workflow_dispatch:
    inputs:
      mock_email_preview:
        description: Send a mock styled email without calling RapidAPI
        required: false
        type: boolean
        default: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run stale-fix script
        id: fix
        if: ${{ github.event.inputs.mock_email_preview != 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BEAT_ANALYTICS_RAPIDAPI_KEY: ${{ secrets.BEAT_ANALYTICS_RAPIDAPI_KEY }}
          MUSIC_METRICS_RAPIDAPI_KEY: ${{ secrets.MUSIC_METRICS_RAPIDAPI_KEY }}
          MUSIC_ANALYTICS_RAPIDAPI_KEY: ${{ secrets.MUSIC_ANALYTICS_RAPIDAPI_KEY }}
          CHECKLEAKEDCC_RAPIDAPI_KEY: ${{ secrets.CHECKLEAKEDCC_RAPIDAPI_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/rapidapi_stale_fix.py

      - name: Create mock email preview summary
        if: ${{ github.event.inputs.mock_email_preview == 'true' }}
        shell: bash
        run: |
          mkdir -p .artifacts
          cat > .artifacts/stale_fix_summary.json <<'JSON'
          {
            "status": "completed",
            "fixed": 8,
            "affected": 8,
            "run_date": "2026-05-15",
            "tracks": [
              {
                "provider": "Beat Analytics",
                "isrc": "SE6A92124216",
                "track_name": "Can't Take My Eyes off You",
                "artist_names": ["Joongle"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=CT",
                "stale": 1791521,
                "new": 1793472
              },
              {
                "provider": "Beat Analytics",
                "isrc": "SE6SA2447903",
                "track_name": "Stay",
                "artist_names": ["Iaco", "AgusAlvarez", "Gina Livia"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=ST",
                "stale": 780157,
                "new": 781167
              },
              {
                "provider": "Beat Analytics",
                "isrc": "SE6XY2535580",
                "track_name": "Dark Days Are Over",
                "artist_names": ["Blaikz", "Shunichi Komazu", "lisawanderlust"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=DD",
                "stale": 578248,
                "new": 579565
              },
              {
                "provider": "Beat Analytics",
                "isrc": "SE62M2206959",
                "track_name": "With A Little Help From My Friends",
                "artist_names": ["Pinkloud", "Snoozegod", "planet emi"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=WF",
                "stale": 1106974,
                "new": 1107083
              },
              {
                "provider": "Beat Analytics",
                "isrc": "SE6TI2182987",
                "track_name": "Fuck I'm Lonely",
                "artist_names": ["Joongle"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=FL",
                "stale": 454131,
                "new": 454418
              },
              {
                "provider": "Music Metrics",
                "isrc": "GX89G2304488",
                "track_name": "VHS",
                "artist_names": ["AtcG", "Nino Lucarelli"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=VH",
                "stale": 1295641,
                "new": 1295671
              },
              {
                "provider": "Music Metrics",
                "isrc": "SE60E2277376",
                "track_name": "Viva La Vida",
                "artist_names": ["Joongle", "Piple"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=VL",
                "stale": 1145666,
                "new": 1146566
              },
              {
                "provider": "MusicAnalytics",
                "isrc": "SE5BU1822404",
                "track_name": "Paris in the Rain",
                "artist_names": ["Lone Tusker"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=PR",
                "stale": 1559241,
                "new": 1559312
              },
              {
                "provider": "CheckLeakedCC",
                "isrc": "SE6XY2545679",
                "track_name": "365",
                "artist_names": ["Ugg'A", "Oliver Roberts"],
                "album_image_url": "https://placehold.co/68x68/202124/d4ff4d/png?text=365",
                "stale": 1129653,
                "new": 1130648
              }
            ]
          }
          JSON

      - name: Check results for notification
        id: notify_check
        if: always()
        shell: bash
        run: |
          SHOULD_NOTIFY="false"
          SUBJECT=""

          if [ ! -f ".artifacts/stale_fix_summary.json" ]; then
            echo "should_notify=false" >> "$GITHUB_OUTPUT"
            echo "subject=" >> "$GITHUB_OUTPUT"
            {
              echo 'body<<ENDOFBODY'
              echo 'No summary file found.'
              echo 'ENDOFBODY'
              echo 'html_body<<ENDOFBODY'
              echo ''
              echo 'ENDOFBODY'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FIXED=$(python3 -c "import json; d=json.load(open('.artifacts/stale_fix_summary.json')); print(d.get('fixed', 0))" 2>/dev/null || echo "0")
          STATUS=$(python3 -c "import json; d=json.load(open('.artifacts/stale_fix_summary.json')); print(d.get('status', 'completed'))" 2>/dev/null || echo "completed")
          AFFECTED=$(python3 -c "import json; d=json.load(open('.artifacts/stale_fix_summary.json')); print(d.get('affected', 0))" 2>/dev/null || echo "0")
          RUN_DATE=$(python3 -c "import json; d=json.load(open('.artifacts/stale_fix_summary.json')); print(d.get('run_date', '?'))" 2>/dev/null || echo "?")

          if [ "$FIXED" != "0" ]; then
            SHOULD_NOTIFY="true"
            if [ "$STATUS" = "partial_runtime_limit" ]; then
              SUBJECT="[SBase] Auto-fix partial: ${FIXED} stale track(s) corrected before runtime limit"
            else
              SUBJECT="[SBase] Auto-fix: ${FIXED} stale track(s) corrected via RapidAPI"
            fi
          elif [ "$STATUS" = "skipped_too_many" ]; then
            SHOULD_NOTIFY="true"
            SUBJECT="[SBase] Auto-fix skipped: ${AFFECTED} stale track(s) exceeded safety threshold"
          fi

          echo "should_notify=$SHOULD_NOTIFY" >> "$GITHUB_OUTPUT"
          echo "subject=${SUBJECT}" >> "$GITHUB_OUTPUT"
          export RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python3 - <<'PY'
          import html
          import json
          import os
          from collections import Counter
          from pathlib import Path

          run_url = os.environ.get("RUN_URL", "")

          with open(".artifacts/stale_fix_summary.json", encoding="utf-8") as f:
              data = json.load(f)

          tracks = data.get("tracks", [])
          email_track_limit = 40
          visible_tracks = tracks[:email_track_limit]
          omitted_track_count = max(0, len(tracks) - len(visible_tracks))
          fixed = int(data.get("fixed") or 0)
          status = str(data.get("status") or "completed")
          affected = int(data.get("affected") or 0)
          run_date_raw = str(data.get("run_date") or "?")
          run_date = html.escape(run_date_raw)
          providers = Counter(str(t.get("provider") or "stream lookup") for t in tracks)

          def esc(value):
              return html.escape(str(value or ""))

          def fmt_int(value):
              try:
                  return f"{int(value):,}"
              except Exception:
                  return "?"

          if status == "skipped_too_many":
              plain_lines = [
                  f"SBase auto-fix skipped for {run_date_raw}",
                  f"Stale tracks: {affected}",
                  "Reason: stale-track count reached the 500-track safety threshold.",
              ]
          elif status == "partial_runtime_limit":
              plain_lines = [
                  f"SBase auto-fix partially completed for {run_date_raw}",
                  f"Fixed: {fixed} of {affected} stale track(s)",
                  "Reason: graceful runtime ceiling reached before the workflow timeout.",
              ]
          else:
              plain_lines = [
                  f"SBase auto-fix complete for {run_date_raw}",
                  f"Fixed: {fixed} stale track(s)",
              ]
          for provider, count in providers.items():
              plain_lines.append(f"{provider}: {count}")
          plain_lines.append("Paid overage: 0")
          plain_lines.append("")

          provider_chips = []
          for provider, count in providers.items():
              if provider in {"Beat Analytics", "Music Metrics"}:
                  color, bg, border = "#bef264", "#1e2718", "#33451f"
              else:
                  color, bg, border = "#93c5fd", "#151f31", "#243653"
              provider_chips.append(
                  f'<span style="display:inline-block;margin:0 6px 6px 0;padding:4px 9px;border:1px solid {border};border-radius:999px;'
                  f'background:{bg};color:{color};font-size:12px;font-weight:600;">{esc(provider)} <span style="color:#ededed;">{count}</span></span>'
              )
          provider_chips.append(
              '<span style="display:inline-block;margin:0 6px 6px 0;padding:4px 9px;border:1px solid #2c2d32;border-radius:999px;'
              'background:#1b1b1f;color:#a1a1aa;font-size:12px;font-weight:600;">0 paid overage</span>'
          )

          rows = []
          for track in visible_tracks:
              isrc = esc(track.get("isrc") or "?")
              title = esc(track.get("track_name") or "Unknown Track")
              image_url = esc(track.get("album_image_url") or "")
              artists = track.get("artist_names")
              if isinstance(artists, list):
                  artist = ", ".join(str(a).strip() for a in artists if str(a).strip())
              else:
                  artist = ""
              artist_plain = artist or "Unknown Artist"
              artist = esc(artist_plain)
              stale = int(track.get("stale") or 0)
              new = int(track.get("new") or 0)
              delta = new - stale
              delta_text = f"+{delta:,}" if delta >= 0 else f"{delta:,}"
              plain_lines.append(
                  f"- {track.get('track_name') or 'Unknown Track'} - {artist_plain} "
                  f"({track.get('isrc') or '?'}) {stale:,} -> {new:,} ({delta_text})"
              )
              rows.append(f"""
                <tr>
                  <td style="padding:9px 0;border-top:1px solid #25262b;">
                    <table role="presentation" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                      <tr>
                        <td style="width:40px;padding:0 10px 0 0;vertical-align:middle;">
                          {f'<img src="{image_url}" width="34" height="34" alt="" style="display:block;width:34px;height:34px;border-radius:7px;border:1px solid #34363b;background:#202124;">' if image_url else '<div style="width:34px;height:34px;border-radius:7px;background:#202124;border:1px solid #34363b;"></div>'}
                        </td>
                        <td style="vertical-align:middle;">
                          <div style="font-size:13px;font-weight:650;color:#ededed;line-height:1.22;">{title}</div>
                          <div style="font-size:12px;color:#a1a1aa;line-height:1.25;margin-top:2px;font-weight:400;">{artist}</div>
                        </td>
                      </tr>
                    </table>
                  </td>
                  <td style="padding:9px 10px;border-top:1px solid #25262b;font:11px ui-monospace,SFMono-Regular,Menlo,monospace;color:#a3e635;white-space:nowrap;">{isrc}</td>
                  <td style="padding:9px 0;border-top:1px solid #25262b;text-align:right;white-space:nowrap;">
                    <div style="font:12px ui-monospace,SFMono-Regular,Menlo,monospace;color:#ededed;font-weight:650;">{fmt_int(new)}</div>
                    <div style="font:11px ui-monospace,SFMono-Regular,Menlo,monospace;color:#8b8d94;margin-top:2px;">from {fmt_int(stale)} <span style="color:#22c55e;font-weight:800;">{delta_text}</span></div>
                  </td>
                </tr>
              """)

          if omitted_track_count:
              plain_lines.append(f"...and {omitted_track_count} more fixed track(s)")
              rows.append(f"""
                <tr>
                  <td colspan="3" style="padding:12px 0;border-top:1px solid #25262b;color:#a1a1aa;font-size:12px;">
                    {omitted_track_count} more fixed track{"s" if omitted_track_count != 1 else ""} omitted from this compact email.
                  </td>
                </tr>
              """)

          plain_lines.append("")
          plain_lines.append(f"Workflow run: {run_url}")
          plain_body = "\n".join(plain_lines)
          track_rows = "".join(rows) or (
              '<tr><td colspan="3" style="padding:12px 0;border-top:1px solid rgba(255,255,255,.08);color:#9ca3af;">No track details available.</td></tr>'
          )

          html_body = f"""<!doctype html>
          <html>
            <body style="margin:0;padding:24px;background:#0a0a0c;color:#ededed;font-family:Inter,Arial,Helvetica,sans-serif;font-size:14px;line-height:1.35;">
              <div style="max-width:700px;margin:0 auto;border:1px solid #2a2b30;border-radius:14px;background:#141419;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.34);">
                <div style="padding:18px 22px 16px;border-bottom:1px solid #25262b;background:#10120f;">
                  <div style="font-size:11px;color:#d4ff4d;font-weight:700;letter-spacing:.06em;text-transform:uppercase;">SBase</div>
                  <div style="margin-top:5px;font-size:22px;font-weight:650;color:#ededed;line-height:1.18;">{'Auto-fix skipped' if status == 'skipped_too_many' else 'Auto-fix partial' if status == 'partial_runtime_limit' else 'Auto-fix complete'}</div>
                  <div style="margin-top:7px;font-size:13px;color:#a1a1aa;">
                    {f'<span style="color:#ededed;font-weight:600;">{affected}</span> stale tracks exceeded safety threshold' if status == 'skipped_too_many' else f'<span style="color:#ededed;font-weight:600;">{fixed}</span> of <span style="color:#ededed;font-weight:600;">{affected}</span> stale tracks fixed before runtime limit' if status == 'partial_runtime_limit' else f'<span style="color:#ededed;font-weight:600;">{fixed}</span> stale track{"s" if fixed != 1 else ""} fixed'}
                    <span style="color:#575a61;">&nbsp;/&nbsp;</span>
                    Run date <span style="color:#ededed;font-weight:600;">{run_date}</span>
                  </div>
                </div>
                <div style="padding:14px 22px 20px;">
                  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin-bottom:13px;">
                    <tr>
                      <td style="padding:0;">
                        <div style="font-size:11px;color:#9ca3af;font-weight:650;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;">Providers used</div>
                        <div>{''.join(provider_chips)}</div>
                      </td>
                    </tr>
                  </table>
                  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin-bottom:4px;">
                    <tr>
                      <td style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;font-weight:650;padding-bottom:7px;">Track</td>
                      <td style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;font-weight:650;padding:0 10px 7px;white-space:nowrap;">ISRC</td>
                      <td style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.05em;font-weight:650;text-align:right;padding-bottom:7px;white-space:nowrap;">Streams</td>
                    </tr>
                  </table>
                  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
                    {track_rows}
                  </table>
                  <div style="margin-top:18px;padding-top:14px;border-top:1px solid #25262b;">
                    <a href="{html.escape(run_url)}" style="display:inline-block;padding:9px 12px;border-radius:9px;background:#d4ff4d;color:#0b0b0c;text-decoration:none;font-size:13px;font-weight:700;">View workflow run</a>
                    <span style="display:inline-block;margin-left:10px;font-size:12px;color:#7d8087;">No paid overage was used by this automated run.</span>
                  </div>
                </div>
              </div>
            </body>
          </html>"""

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as output:
              output.write(f"body<<ENDOFBODY\n{plain_body}\nENDOFBODY\n")
              output.write(f"html_body<<ENDOFBODY\n{html_body}\nENDOFBODY\n")
          PY

      - name: Send notification email
        if: always() && steps.notify_check.outputs.should_notify == 'true'
        uses: ./.github/actions/notify-email
        with:
          password: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
          subject: ${{ steps.notify_check.outputs.subject }}
          body: ${{ steps.notify_check.outputs.body }}
          html_body: ${{ steps.notify_check.outputs.html_body }}
