name: RapidAPI Stale Track Fix

permissions:
  contents: read

on:
  schedule:
    - cron: "15 11 * * *" # 11:15 UTC daily (~1h15m after ingestion)
  workflow_dispatch: {}

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run stale-fix script
        id: fix
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python scripts/rapidapi_stale_fix.py

      - name: Check results for notification
        id: notify_check
        if: always()
        shell: bash
        run: |
          SHOULD_NOTIFY="false"
          SUBJECT=""
          BODY=""

          if [ ! -f ".artifacts/stale_fix_summary.json" ]; then
            echo "should_notify=false" >> "$GITHUB_OUTPUT"
            echo "subject=" >> "$GITHUB_OUTPUT"
            {
              echo 'body<<ENDOFBODY'
              echo 'No summary file found.'
              echo 'ENDOFBODY'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FIXED=$(python3 -c "import json; d=json.load(open('.artifacts/stale_fix_summary.json')); print(d.get('fixed', 0))" 2>/dev/null || echo "0")
          RUN_DATE=$(python3 -c "import json; d=json.load(open('.artifacts/stale_fix_summary.json')); print(d.get('run_date', '?'))" 2>/dev/null || echo "?")

          if [ "$FIXED" != "0" ]; then
            SHOULD_NOTIFY="true"
            SUBJECT="[SpotiBase] Auto-fix: ${FIXED} stale track(s) corrected via RapidAPI"
          fi

          echo "should_notify=$SHOULD_NOTIFY" >> "$GITHUB_OUTPUT"
          echo "subject=${SUBJECT}" >> "$GITHUB_OUTPUT"
          TRACK_DETAILS=""
          if [ -f ".artifacts/stale_fix_summary.json" ]; then
            TRACK_DETAILS=$(python3 - <<'PY' 2>/dev/null || echo ""
          import json

          with open(".artifacts/stale_fix_summary.json", encoding="utf-8") as f:
              data = json.load(f)

          for idx, track in enumerate(data.get("tracks", []), start=1):
              isrc = str(track.get("isrc") or "?")
              track_name = str(track.get("track_name") or "Unknown Track")
              artists = track.get("artist_names")
              if isinstance(artists, list):
                  artist_name = ", ".join(str(a).strip() for a in artists if str(a).strip())
              else:
                  artist_name = ""
              artist_name = artist_name or "Unknown Artist"
              stale = int(track.get("stale") or 0)
              new = int(track.get("new") or 0)
              delta = new - stale
              print(f"{idx}. {artist_name} - {track_name}")
              print(f"   ISRC: {isrc}")
              print(f"   {stale:,} -> {new:,} (+{delta:,})")
              if idx < len(data.get("tracks", [])):
                  print()
          PY
          )
          fi

          {
            echo 'body<<ENDOFBODY'
            echo "Fixed ${FIXED} stale tracks for ${RUN_DATE}"
            echo ""
            if [ -n "$TRACK_DETAILS" ]; then
              echo "$TRACK_DETAILS"
              echo ""
            fi
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo 'ENDOFBODY'
          } >> "$GITHUB_OUTPUT"

      - name: Send notification email
        if: always() && steps.notify_check.outputs.should_notify == 'true'
        uses: ./.github/actions/notify-email
        with:
          password: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
          subject: ${{ steps.notify_check.outputs.subject }}
          body: ${{ steps.notify_check.outputs.body }}
