name: SOT Competitor Daily Dashboard Sync

on:
  schedule:
    - cron: "15 9 * * *"
    - cron: "45 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no clicking)"
        required: false
        type: boolean
        default: false
      add_only:
        description: "Add-only mode (never remove from dashboards)"
        required: false
        type: boolean
        default: false
      limit:
        description: "Run only first N tasks (for testing)"
        required: false
        type: string
      playlist_keys:
        description: "Comma-separated playlist keys to sync"
        required: false
        type: string

concurrency:
  group: sot-competitor-dashboard-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - name: Write storage state from secret
        env:
          SOT_STORAGE_STATE_B64: ${{ secrets.SOT_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$SOT_STORAGE_STATE_B64" ]; then exit 0; fi
          echo "$SOT_STORAGE_STATE_B64" | base64 --decode > sot_state.json
      - name: Sync competitor dashboards to playlists
        env:
          SOT_EMAIL: ${{ secrets.SOT_EMAIL }}
          SOT_PASSWORD: ${{ secrets.SOT_PASSWORD }}
        run: |
          ARGS="--headless"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.add_only }}" = "true" ]; then ARGS="$ARGS --no-sync"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ -n "${{ inputs.playlist_keys }}" ]; then ARGS="$ARGS --only-playlist-keys ${{ inputs.playlist_keys }}"; fi
          python scripts/sot_sync_dashboards.py --config config/competitor_playlists.csv --storage-state sot_state.json $ARGS
      - name: Upload sync log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sot-competitor-dashboard-sync-${{ github.run_id }}
          path: .artifacts/
          if-no-files-found: warn
          include-hidden-files: true
