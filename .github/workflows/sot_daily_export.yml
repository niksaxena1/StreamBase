name: SOT Daily Export

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC daily
  workflow_dispatch: {}

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Write storage state from secret
        env:
          SOT_STORAGE_STATE_B64: ${{ secrets.SOT_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$SOT_STORAGE_STATE_B64" ]; then
            echo "SOT_STORAGE_STATE_B64 not set (ok). Will rely on login fallback if configured."
            exit 0
          fi
          echo "$SOT_STORAGE_STATE_B64" | base64 --decode > sot_state.json

      - name: Export dashboards
        env:
          SOT_EMAIL: ${{ secrets.SOT_EMAIL }}
          SOT_PASSWORD: ${{ secrets.SOT_PASSWORD }}
        run: |
          python scripts/sot_export_dashboards.py --config config/playlists.csv --storage-state sot_state.json --headless --fail-on-empty --auth-debug

      - name: Upload exports artifact
        uses: actions/upload-artifact@v4
        with:
          name: sot-exports-${{ github.run_id }}
          path: exports/
          if-no-files-found: error
