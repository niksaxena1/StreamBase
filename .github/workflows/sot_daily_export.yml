name: SOT Daily Export

permissions:
  actions: read
  contents: read

on:
  schedule:
    # Primary run + a 1h-later fallback to reduce missed schedules.
    # Idempotency is enforced via a Supabase pre-check (see steps below).
    - cron: "0 10 * * *" # 10:00 UTC daily
    - cron: "0 11 * * *" # 11:00 UTC daily (fallback)
  workflow_dispatch:
    inputs:
      run_date:
        description: "Override run date (YYYY-MM-DD). Default: UTC today"
        required: false
        type: string
      force_reingest:
        description: "Force a re-ingest for this run date even if already marked success"
        required: false
        type: boolean
        default: false
      skip_sync_gate:
        description: "Skip the Dashboard Sync success gate (manual runs only; not recommended)"
        required: false
        type: boolean
        default: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Compute run date (UTC)
        id: run_date
        shell: bash
        run: |
          RUN_DATE="${{ github.event.inputs.run_date }}"
          if [ -z "$RUN_DATE" ]; then RUN_DATE=$(date -u +'%Y-%m-%d'); fi
          echo "run_date=$RUN_DATE" >> "$GITHUB_OUTPUT"

      - name: "Gate: require successful Dashboard Sync"
        id: sync_gate
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Allow manual overrides if explicitly requested.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.skip_sync_gate }}" = "true" ]; then
            echo "⚠️ Skipping Dashboard Sync gate (manual override)."
            exit 0
          fi

          RUN_DATE="${{ steps.run_date.outputs.run_date }}"
          echo "Checking Dashboard Sync runs for UTC date: $RUN_DATE"

          # Query recent runs for the dashboard sync workflow (by file name, not numeric id).
          # Reliability goals:
          # - Avoid huge env vars (runner limit → "argument list too long")
          # - Avoid pipe+heredoc stdin conflicts
          # - Fail closed: if we can't verify sync succeeded, we block export
          RUNS_ENDPOINT="repos/${GITHUB_REPOSITORY}/actions/workflows/sot_daily_dashboard_sync.yml/runs?branch=main&per_page=100"

          # Returns "true" if any successful sync run exists for RUN_DATE.
          # NOTE: Keep quoting simple to avoid bash escaping edge-cases.
          OK="$(gh api "$RUNS_ENDPOINT" --jq '.workflow_runs | any(.[]; (.created_at | startswith("'"$RUN_DATE"'")) and .status=="completed" and .conclusion=="success")' || true)"

          if [ "$OK" != "true" ]; then
            echo "❌ No successful 'SOT Daily Dashboard Sync' workflow run found for $RUN_DATE UTC. Blocking export."
            echo "Recent runs (newest first):"
            # Best-effort debug output (do not un-block export if this fails).
            gh api "$RUNS_ENDPOINT" --jq '.workflow_runs[:10] | .[] | "- \(.created_at) event=\(.event) status=\(.status) conclusion=\(.conclusion) run_id=\(.id)"' || true
            exit 1
          fi

          echo "✅ Dashboard Sync succeeded for $RUN_DATE UTC. Proceeding."

      - name: "Pre-check: skip if already ingested"
        id: precheck
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Default: run the workflow.
          SHOULD_RUN="true"
          RUN_DATE="${{ steps.run_date.outputs.run_date }}"
          FORCE="${{ github.event.inputs.force_reingest }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$FORCE" = "true" ]; then
            echo "⚠️ Force re-ingest enabled. Skipping idempotency pre-check for $RUN_DATE."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase secrets not set; cannot pre-check. Proceeding."
          else
            # Query PostgREST for a successful ingestion run on this date.
            # If it exists, exit early to keep daily schedules effectively-once.
            URL="$SUPABASE_URL/rest/v1/ingestion_runs?select=status&run_date=eq.$RUN_DATE&status=eq.success&limit=1"
            HIT=$(curl -sS -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" "$URL" || true)
            if echo "$HIT" | grep -q "\"status\":\"success\""; then
              echo "✅ Already ingested for $RUN_DATE. Skipping."
              SHOULD_RUN="false"
            else
              echo "No successful ingestion found for $RUN_DATE. Proceeding."
            fi
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.precheck.outputs.should_run == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.precheck.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Write storage state from secret
        if: steps.precheck.outputs.should_run == 'true'
        env:
          SOT_STORAGE_STATE_B64: ${{ secrets.SOT_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$SOT_STORAGE_STATE_B64" ]; then
            echo "SOT_STORAGE_STATE_B64 not set (ok). Will rely on login fallback if configured."
            exit 0
          fi
          echo "$SOT_STORAGE_STATE_B64" | base64 --decode > sot_state.json

      - name: Export dashboards
        id: export_dashboards
        if: steps.precheck.outputs.should_run == 'true'
        env:
          SOT_EMAIL: ${{ secrets.SOT_EMAIL }}
          SOT_PASSWORD: ${{ secrets.SOT_PASSWORD }}
        run: |
          python scripts/sot_export_dashboards.py --config config/playlists.csv --storage-state sot_state.json --headless --fail-on-empty --auth-debug

      - name: Upload exports artifact
        if: steps.precheck.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sot-exports-${{ github.run_id }}
          path: exports/
          if-no-files-found: error

      - name: Upload exports to Supabase Storage (optional)
        if: steps.precheck.outputs.should_run == 'true'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_STORAGE_PREFIX: ${{ secrets.SUPABASE_STORAGE_PREFIX }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase secrets not set (ok). Skipping Storage upload."
            exit 0
          fi
          python scripts/supabase_upload_exports.py --exports-dir exports

      - name: Ingest exports into Supabase Postgres (optional)
        id: ingest
        if: steps.precheck.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          SUPABASE_STORAGE_PREFIX: ${{ secrets.SUPABASE_STORAGE_PREFIX }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase secrets not set (ok). Skipping DB ingestion."
            exit 0
          fi
          RUN_DATE="${{ steps.run_date.outputs.run_date }}"
          python scripts/ingest_exports_to_supabase.py --config config/playlists.csv --exports-dir exports --run-date "$RUN_DATE"

      - name: Check export results for notification
        id: notify_check
        if: always()
        shell: bash
        run: |
          SHOULD_NOTIFY="false"
          SUBJECT=""
          STALE="false"

          EXPORT_OUTCOME="${{ steps.export_dashboards.outcome }}"
          INGEST_OUTCOME="${{ steps.ingest.outcome }}"

          # Notify if export or ingestion failed (but not if gate blocked — sync notification covers that).
          if [ "$EXPORT_OUTCOME" = "failure" ]; then
            SHOULD_NOTIFY="true"
            SUBJECT="[SBase] Daily Export FAILED (export step)"
          fi

          if [ "$INGEST_OUTCOME" = "failure" ]; then
            SHOULD_NOTIFY="true"
            SUBJECT="[SBase] Daily Export FAILED (ingestion step)"
          fi

          # Check for stale source data (ingestion succeeded but Spotify didn't update).
          STALE_TRACKS_COUNT="0"
          STALE_TRACKS_SEVERITY=""
          if [ -f ".artifacts/ingestion_summary.json" ]; then
            STALE=$(python3 -c "import json; d=json.load(open('.artifacts/ingestion_summary.json')); print('true' if d.get('stale_data_detected') else 'false')" 2>/dev/null || echo "false")
            STALE_TRACKS_COUNT=$(python3 -c "import json; d=json.load(open('.artifacts/ingestion_summary.json')); print(d.get('individual_tracks_stale_count', 0))" 2>/dev/null || echo "0")
            STALE_TRACKS_SEVERITY=$(python3 -c "import json; d=json.load(open('.artifacts/ingestion_summary.json')); print(d.get('individual_tracks_stale_severity') or '')" 2>/dev/null || echo "")
            ZEROED_COUNT=$(python3 -c "import json; d=json.load(open('.artifacts/ingestion_summary.json')); print(d.get('excluded_tracks_zeroed_count', 0))" 2>/dev/null || echo "0")
            if [ "$STALE" = "true" ]; then
              SHOULD_NOTIFY="true"
              SUBJECT="${SUBJECT:-[SBase] Daily Export: stale source data detected}"
            fi
            if [ "$STALE_TRACKS_SEVERITY" = "critical" ]; then
              SHOULD_NOTIFY="true"
              SUBJECT="${SUBJECT:-[SBase] Daily Export: ${STALE_TRACKS_COUNT} track(s) with stale streams (CRITICAL)}"
            fi
            if [ "$ZEROED_COUNT" != "0" ]; then
              SHOULD_NOTIFY="true"
              SUBJECT="${SUBJECT:-[SBase] Daily Export: ${ZEROED_COUNT} excluded track(s) streams zeroed}"
            fi
          fi

          echo "should_notify=$SHOULD_NOTIFY" >> "$GITHUB_OUTPUT"
          echo "subject=${SUBJECT:-[SBase] Daily Export: issue}" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<ENDOFBODY'
            echo "SOT Daily Export results for ${{ steps.run_date.outputs.run_date }}:"
            echo ""
            echo "  Export step: ${EXPORT_OUTCOME:-skipped}"
            echo "  Ingest step: ${INGEST_OUTCOME:-skipped}"
            echo "  Stale source data: ${STALE}"
            echo "  Stale tracks (per-track): ${STALE_TRACKS_COUNT}"
            echo "  Excluded tracks zeroed: ${ZEROED_COUNT}"
            echo ""
            if [ "$STALE" = "true" ]; then
              echo "Spotify likely did not update stream counts. Data was ingested as-is."
              echo "Check the Health page for the stale_source_data warning and use"
              echo "manual overrides if correction is needed."
              echo ""
            fi
            if [ "$STALE_TRACKS_COUNT" != "0" ]; then
              echo "${STALE_TRACKS_COUNT} track(s) had zero daily stream growth despite"
              echo "having significant total streams (severity: ${STALE_TRACKS_SEVERITY:-warn})."
              echo "The RapidAPI auto-fix is scheduled to run at 11:15 UTC and will"
              echo "attempt to correct up to 20 tracks automatically."
              echo ""
            fi
            if [ "$ZEROED_COUNT" != "0" ]; then
              echo "${ZEROED_COUNT} excluded (taken-down) track(s) had their total streams"
              echo "drop to zero. This likely indicates a data-source glitch. Check the"
              echo "Health page for the excluded_track_streams_zeroed warning for details."
              echo ""
            fi
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo 'ENDOFBODY'
          } >> "$GITHUB_OUTPUT"

      - name: Send notification email
        if: always() && steps.notify_check.outputs.should_notify == 'true'
        uses: ./.github/actions/notify-email
        with:
          password: ${{ secrets.NOTIFY_SMTP_PASSWORD }}
          subject: ${{ steps.notify_check.outputs.subject }}
          body: ${{ steps.notify_check.outputs.body }}
